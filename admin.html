<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f0f2f5" />
  <title>Admin - Elite Arrows League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .admin-tab {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--border-radius-sm);
      padding: 10px 20px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .admin-tab.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }
    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      margin-bottom: 24px;
    }
    .app-admin-item {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }
    .app-admin-item:last-child {
      border-bottom: none;
    }
    .app-admin-info {
      flex: 1;
    }
    .app-admin-info .name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .app-admin-info .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .app-admin-info .details {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .app-admin-info .details p {
      margin: 4px 0;
    }
    .app-admin-info .why-join {
      margin-top: 8px;
      padding: 10px;
      background: #f9fafb;
      border-radius: var(--border-radius-sm);
      border-left: 3px solid var(--accent-primary);
      font-style: italic;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .app-admin-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-approve {
      background: var(--success);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .btn-reject {
      background: var(--error);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--border-radius-md);
      padding: 20px;
      text-align: center;
    }
    .stat-card .stat-number {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-cyan));
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .position-tag {
      display: inline-block;
      background: #e8ecf1;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    @media (max-width: 768px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
      .app-admin-item {
        flex-direction: column;
      }
      .app-admin-actions {
        flex-direction: row;
        width: 100%;
      }
      .app-admin-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">ELITE ARROWS ADMIN</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Exit Admin
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="admin-container">
        <h2 class="section-title">Applications <span>Management</span></h2>

        <div class="stats-row" id="statsRow">
          <div class="stat-card">
            <div class="stat-number" id="totalPlayerCount">0</div>
            <div class="stat-label">Player Apps</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="pendingPlayerCount">0</div>
            <div class="stat-label">Pending Players</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalRoleCount">0</div>
            <div class="stat-label">Role Apps</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="pendingRoleCount">0</div>
            <div class="stat-label">Pending Roles</div>
          </div>
        </div>

        <div class="admin-tabs">
          <button class="admin-tab active" onclick="switchTab('players', this)">Player Applications</button>
          <button class="admin-tab" onclick="switchTab('roles', this)">Role Applications</button>
        </div>

        <div class="admin-card" id="playersSection">
          <h3 class="card-title">Player Applications</h3>
          <div id="playersList">
            <p style="color: var(--text-muted);">No applications found.</p>
          </div>
        </div>

        <div class="admin-card" id="rolesSection" style="display: none;">
          <h3 class="card-title">Role Applications</h3>
          <div id="rolesList">
            <p style="color: var(--text-muted);">No applications found.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.className = 'toast ' + (type || '');
      toast.innerHTML = '<span class="toast-icon">✓</span> ' + message;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    function switchTab(tab, btn) {
      document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('playersSection').style.display = tab === 'players' ? 'block' : 'none';
      document.getElementById('rolesSection').style.display = tab === 'roles' ? 'block' : 'none';
    }

    function updateApplicationStatus(storageKey, id, newStatus) {
      var apps = JSON.parse(localStorage.getItem(storageKey) || '[]');
      var app = apps.find(function(a) { return a.id === id; });
      if (app) {
        app.status = newStatus;
        localStorage.setItem(storageKey, JSON.stringify(apps));
        showToast(app.fullName + ' ' + (newStatus === 'approved' ? 'approved' : 'rejected') + '!', 'success');
        loadAdmin();
      }
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    var positionLabels = {
      streamer: 'Streamer / Content Creator',
      moderator: 'Moderator',
      analyst: 'Stats & Data Analyst',
      designer: 'Graphic Designer',
      social: 'Social Media Manager',
      developer: 'Developer',
      other: 'Other'
    };

    function loadAdmin() {
      var playerApps = JSON.parse(localStorage.getItem('eliteArrowsApplications') || '[]');
      var roleApps = JSON.parse(localStorage.getItem('eliteArrowsRoleApplications') || '[]');

      document.getElementById('totalPlayerCount').textContent = playerApps.length;
      document.getElementById('pendingPlayerCount').textContent = playerApps.filter(function(a) { return a.status === 'pending'; }).length;
      document.getElementById('totalRoleCount').textContent = roleApps.length;
      document.getElementById('pendingRoleCount').textContent = roleApps.filter(function(a) { return a.status === 'pending'; }).length;

      // Player apps
      var playersContainer = document.getElementById('playersList');
      if (playerApps.length === 0) {
        playersContainer.innerHTML = '<p style="color: var(--text-muted);">No applications found.</p>';
      } else {
        playersContainer.innerHTML = playerApps.reverse().map(function(app) {
          var statusClass = app.status === 'approved' ? 'status-approved' : app.status === 'rejected' ? 'status-rejected' : 'status-pending';
          var statusLabel = app.status.charAt(0).toUpperCase() + app.status.slice(1);
          return '<div class="app-admin-item">' +
            '<div class="app-admin-info">' +
              '<div class="name">' + escapeHtml(app.fullName) + '</div>' +
              '<div class="meta">' + app.id + ' &middot; ' + new Date(app.submittedAt).toLocaleString() + ' &middot; ' +
                '<span class="' + statusClass + '" style="padding: 2px 8px; border-radius: 99px; font-weight: 700; font-size: 0.75rem;">' + statusLabel + '</span></div>' +
              '<div class="details">' +
                '<p>Email: ' + escapeHtml(app.email) + '</p>' +
                '<p>Age: ' + app.age + ' &middot; Location: ' + escapeHtml(app.location) + '</p>' +
                '<p>Experience: ' + escapeHtml(app.experience) + ' &middot; Avg Score: ' + (app.avgScore || 'N/A') + '</p>' +
                '<p>Availability: ' + escapeHtml(app.availability) + ' &middot; Referral: ' + escapeHtml(app.referral || 'N/A') + '</p>' +
              '</div>' +
              '<div class="why-join">' + escapeHtml(app.whyJoin) + '</div>' +
            '</div>' +
            (app.status === 'pending'
              ? '<div class="app-admin-actions">' +
                  '<button class="btn-approve" onclick="updateApplicationStatus(\'eliteArrowsApplications\', \'' + app.id + '\', \'approved\')">Approve</button>' +
                  '<button class="btn-reject" onclick="updateApplicationStatus(\'eliteArrowsApplications\', \'' + app.id + '\', \'rejected\')">Reject</button>' +
                '</div>'
              : '') +
          '</div>';
        }).join('');
      }

      // Role apps
      var rolesContainer = document.getElementById('rolesList');
      if (roleApps.length === 0) {
        rolesContainer.innerHTML = '<p style="color: var(--text-muted);">No applications found.</p>';
      } else {
        rolesContainer.innerHTML = roleApps.reverse().map(function(app) {
          var statusClass = app.status === 'approved' ? 'status-approved' : app.status === 'rejected' ? 'status-rejected' : 'status-pending';
          var statusLabel = app.status.charAt(0).toUpperCase() + app.status.slice(1);
          return '<div class="app-admin-item">' +
            '<div class="app-admin-info">' +
              '<div class="name">' + escapeHtml(app.fullName) + '</div>' +
              '<div class="meta">' + app.id + ' &middot; ' + new Date(app.submittedAt).toLocaleString() + ' &middot; ' +
                '<span class="' + statusClass + '" style="padding: 2px 8px; border-radius: 99px; font-weight: 700; font-size: 0.75rem;">' + statusLabel + '</span></div>' +
              '<div class="details">' +
                '<p>Email: ' + escapeHtml(app.email) + '</p>' +
                '<p>Position: <span class="position-tag">' + escapeHtml(positionLabels[app.position] || app.position) + '</span> &middot; Availability: ' + escapeHtml(app.availability) + '</p>' +
                (app.portfolio ? '<p>Portfolio: <a href="' + escapeHtml(app.portfolio) + '" target="_blank" style="color: var(--accent-primary);">' + escapeHtml(app.portfolio) + '</a></p>' : '') +
              '</div>' +
              '<div class="why-join">' + escapeHtml(app.experience) + '</div>' +
            '</div>' +
            (app.status === 'pending'
              ? '<div class="app-admin-actions">' +
                  '<button class="btn-approve" onclick="updateApplicationStatus(\'eliteArrowsRoleApplications\', \'' + app.id + '\', \'approved\')">Approve</button>' +
                  '<button class="btn-reject" onclick="updateApplicationStatus(\'eliteArrowsRoleApplications\', \'' + app.id + '\', \'rejected\')">Reject</button>' +
                '</div>'
              : '') +
          '</div>';
        }).join('');
      }
    }

    document.addEventListener('DOMContentLoaded', loadAdmin);
  </script>
</body>
</html>
