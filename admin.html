<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e1b4b" />
  <title>Admin - Elite Arrows League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      margin-bottom: 24px;
    }
    .app-admin-item {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }
    .app-admin-item:last-child {
      border-bottom: none;
    }
    .app-admin-info {
      flex: 1;
    }
    .app-admin-info .name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .app-admin-info .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .app-admin-info .details {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .app-admin-info .details p {
      margin: 4px 0;
    }
    .app-admin-info .why-join {
      margin-top: 8px;
      padding: 10px;
      background: #ffffff08;
      border-radius: var(--border-radius-sm);
      border-left: 3px solid var(--accent-primary);
      font-style: italic;
    }
    .app-admin-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-approve {
      background: var(--success);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .btn-approve:hover {
      opacity: 0.9;
    }
    .btn-reject {
      background: var(--error);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .btn-reject:hover {
      opacity: 0.9;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--border-radius-md);
      padding: 20px;
      text-align: center;
    }
    .stat-card .stat-number {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-cyan));
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    @media (max-width: 768px) {
      .stats-row {
        grid-template-columns: 1fr;
      }
      .app-admin-item {
        flex-direction: column;
      }
      .app-admin-actions {
        flex-direction: row;
        width: 100%;
      }
      .app-admin-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <a href="/" class="header-logo">ELITE ARROWS ADMIN</a>
      <nav class="header-nav">
        <a href="/">Exit Admin</a>
      </nav>
    </header>

    <main class="admin-container">
      <h2 class="section-title">Applications <span>Management</span></h2>

      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total Applications</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="pendingCount">0</div>
          <div class="stat-label">Pending Review</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="approvedCount">0</div>
          <div class="stat-label">Approved</div>
        </div>
      </div>

      <div class="admin-card">
        <h3 class="card-title">All Applications</h3>
        <div id="applicationsList">
          <p style="color: var(--text-muted);">No applications found.</p>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.className = 'toast ' + (type || '');
      toast.innerHTML = `<span class="toast-icon">✓</span> ${message}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function updateApplicationStatus(id, newStatus) {
      const apps = JSON.parse(localStorage.getItem('eliteArrowsApplications') || '[]');
      const app = apps.find(a => a.id === id);
      if (app) {
        app.status = newStatus;
        localStorage.setItem('eliteArrowsApplications', JSON.stringify(apps));
        showToast(`${app.fullName} ${newStatus === 'approved' ? 'approved' : 'rejected'}!`, 'success');
        loadAdmin();
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function loadAdmin() {
      const apps = JSON.parse(localStorage.getItem('eliteArrowsApplications') || '[]');
      const container = document.getElementById('applicationsList');

      document.getElementById('totalCount').textContent = apps.length;
      document.getElementById('pendingCount').textContent = apps.filter(a => a.status === 'pending').length;
      document.getElementById('approvedCount').textContent = apps.filter(a => a.status === 'approved').length;

      if (apps.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted);">No applications found.</p>';
        return;
      }

      container.innerHTML = apps.reverse().map(app => {
        const statusClass = app.status === 'approved' ? 'status-approved' : app.status === 'rejected' ? 'status-rejected' : 'status-pending';
        const statusLabel = app.status.charAt(0).toUpperCase() + app.status.slice(1);

        return `
          <div class="app-admin-item">
            <div class="app-admin-info">
              <div class="name">${escapeHtml(app.fullName)}</div>
              <div class="meta">
                ${app.id} &middot; ${new Date(app.submittedAt).toLocaleString()} &middot;
                <span class="${statusClass}" style="padding: 2px 8px; border-radius: 99px; font-weight: 700; font-size: 0.75rem;">${statusLabel}</span>
              </div>
              <div class="details">
                <p>Email: ${escapeHtml(app.email)}</p>
                <p>Age: ${app.age} &middot; Location: ${escapeHtml(app.location)}</p>
                <p>Experience: ${escapeHtml(app.experience)} &middot; Avg Score: ${app.avgScore || 'N/A'}</p>
                <p>Availability: ${escapeHtml(app.availability)} &middot; Referral: ${escapeHtml(app.referral) || 'N/A'}</p>
              </div>
              <div class="why-join">${escapeHtml(app.whyJoin)}</div>
            </div>
            ${app.status === 'pending' ? `
              <div class="app-admin-actions">
                <button class="btn-approve" onclick="updateApplicationStatus('${app.id}', 'approved')">Approve</button>
                <button class="btn-reject" onclick="updateApplicationStatus('${app.id}', 'rejected')">Reject</button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', loadAdmin);
  </script>
</body>
</html>
